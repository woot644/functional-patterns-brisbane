<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" width="400" height="360">
  <!-- Open ring (gap at bottom for stem) -->
  <path d="M 200 25 A 90 90 0 1 1 165 195" fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round"/>
  <path d="M 200 25 A 90 90 0 0 0 235 195" fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round"/>
  <!-- Blue stem connecting into the gap -->
  <rect x="173" y="185" width="54" height="55" rx="4" fill="#4A9FD9"/>
  <!-- White rounded caps on stem sides to blend with ring ends -->
  <circle cx="173" cy="195" r="8" fill="#FFFFFF"/>
  <circle cx="227" cy="195" r="8" fill="#FFFFFF"/>
  <!-- FUNCTIONAL PATTERNS text -->
  <text x="200" y="290" text-anchor="middle" font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="25" fill="#FFFFFF" letter-spacing="8">FUNCTIONAL PATTERNS</text>
  <!-- BRISBANE text -->
  <text x="200" y="325" text-anchor="middle" font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="28" fill="#FFFFFF" letter-spacing="5">BRISBANE</text>
</svg>
